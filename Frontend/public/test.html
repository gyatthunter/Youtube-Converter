<!DOCTYPE html>
<html>
<head><title>Download Test</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:40px;">
  <h1>YouTube to MP3 - Direct Test</h1>
  <input id="url" type="text" value="https://www.youtube.com/watch?v=jNQXAC9IVRw" 
         style="width:500px;padding:10px;font-size:16px;" />
  <br><br>
  <button id="btn" onclick="startDownload()" style="padding:15px 30px;font-size:18px;cursor:pointer;">
    DOWNLOAD
  </button>
  <div id="status" style="margin-top:20px;font-size:18px;"></div>

  <script>
    async function startDownload() {
      const url = document.getElementById('url').value;
      const status = document.getElementById('status');
      const btn = document.getElementById('btn');
      
      btn.disabled = true;
      status.textContent = 'Starting conversion...';

      try {
        // Step 1: Start conversion
        const res = await fetch('/api/convert?url=' + encodeURIComponent(url));
        const { jobId } = await res.json();
        status.textContent = 'Converting... jobId=' + jobId;

        // Step 2: Poll progress
        await new Promise((resolve, reject) => {
          const interval = setInterval(async () => {
            const pres = await fetch('/api/progress?jobId=' + jobId);
            const data = await pres.json();
            status.textContent = `Status: ${data.status} | Progress: ${data.progress}%`;
            
            if (data.status === 'completed') {
              clearInterval(interval);
              resolve();
            } else if (data.status === 'error') {
              clearInterval(interval);
              reject(new Error('Conversion failed'));
            }
          }, 1000);
        });

        // Step 3: Download
        status.textContent = 'DOWNLOADING FILE...';
        window.location.href = '/api/download/' + jobId;
        
        setTimeout(() => {
          status.textContent = 'Done! Check your downloads folder.';
          btn.disabled = false;
        }, 3000);

      } catch(e) {
        status.textContent = 'ERROR: ' + e.message;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
